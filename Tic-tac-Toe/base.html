<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tic-Tac-Toe</title>
    <link rel="stylesheet" href="base.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class = "intro">
        <h1>TIC-TAC-TOE</h1>
        <h3>Instructions</h3>
        <p>There will be 2 players. X, and O. You will each take turns to place down one X or one O on a grid. First to connect 3 in any straight line wins!!!</p>
    </div>
    <div class = "main">
        <div class = "ui">
        <div class = "row">
            <input type = "text" id = "c1" class="cell" readonly onclick="mark(1)">
            <input type = "text" id = "c2" class="cell" readonly onclick="mark(2)">
            <input type = "text" id = "c3" class="cell" readonly onclick="mark(3)">
        </div>
        <div class = "row">
            <input type = "text" id = "c4" class="cell" readonly onclick="mark(4)">
            <input type = "text" id = "c5" class="cell" readonly onclick="mark(5)">
            <input type = "text" id = "c6" class="cell" readonly onclick="mark(6)">
        </div>
        <div class = "row">
            <input type = "text" id = "c7" class="cell" readonly onclick="mark(7)">
            <input type = "text" id = "c8" class="cell" readonly onclick="mark(8)">
            <input type = "text" id = "c9" class="cell" readonly onclick="mark(9)">
        </div>
    </div>
    </div>
    <div class="text-center mt-4">
        <button onclick="resetGame()" class="btn btn-danger">Reset Game</button>
    </div>

    <script src="base.js"></script>
</body>
</html>
